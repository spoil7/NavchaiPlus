{% extends "base.html" %}

{% block title %}Створення відповіді{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h2>
                <i class="bi bi-plus-circle"></i>
                Створення відповіді
            </h2>

            <p class="text-muted mb-0">
                Додайте нову відповідь до питання
            </p>

        </div>

        <a href="{% url 'answers:list' %}" class="btn btn-secondary">

            <i class="bi bi-arrow-left"></i>
            Назад

        </a>

    </div>

    <div class="card shadow-sm border-0">

        <div class="card-body">

            <form method="post">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">
                        Питання
                    </label>

                    {{ form.question }}

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Відповідь
                    </label>

                    {{ form.text }}

                </div>

                <div class="form-check mb-3">

                    {{ form.is_correct }}

                    <label class="form-check-label">

                        Правильна відповідь

                    </label>

                </div>

                <div class="mb-4">

                    <label class="form-label">

                        Порядок

                    </label>

                    {{ form.order }}

                </div>

                <button class="btn btn-primary">

                    <i class="bi bi-check-circle"></i>

                    Зберегти

                </button>

                <a href="{% url 'answers:list' %}" class="btn btn-outline-secondary">

                    Скасувати

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
