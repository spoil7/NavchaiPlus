{% extends "base.html" %}

{% block title %}Видалення відповіді{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow-sm border-danger">

                <div class="card-header bg-danger text-white">

                    <h4 class="mb-0">

                        <i class="bi bi-trash"></i>

                        Видалення відповіді

                    </h4>

                </div>

                <div class="card-body">

                    <p class="fs-5">

                        Ви дійсно бажаєте видалити цю відповідь?

                    </p>

                    <div class="alert alert-light border">

                        <strong>{{ answer.text }}</strong>

                    </div>

                    <form method="post">

                        {% csrf_token %}

                        <button type="submit" class="btn btn-danger">

                            <i class="bi bi-trash"></i>

                            Видалити

                        </button>

                        <a href="{% url 'answers:list' %}" class="btn btn-secondary">

                            Скасувати

                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
