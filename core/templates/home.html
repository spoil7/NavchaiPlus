<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Навчай+</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#eaf4ff,#cfe7ff);
            font-family:"Segoe UI",sans-serif;
        }

        .card{
            width:700px;
            background:white;
            border-radius:25px;
            padding:50px;
            text-align:center;
            box-shadow:0 15px 40px rgba(0,0,0,.15);
        }

        h1{
            color:#0d6efd;
            font-size:56px;
            margin-bottom:10px;
        }

        p{
            color:#555;
            font-size:20px;
        }

        .btn-main{
            margin-top:30px;
            padding:15px 40px;
            border-radius:12px;
            font-size:20px;
        }

        .features{
            margin-top:40px;
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:15px;
        }

        .feature{
            background:#f4f8ff;
            padding:18px;
            border-radius:12px;
            font-weight:600;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>📚 Навчай+</h1>

    <p>
        Платформа цифрового навчання працівників комунальних установ
    </p>

    <button class="btn btn-primary btn-main">
        Увійти
    </button>

    <div class="features">

        <div class="feature">
            🎓 Курси
        </div>

        <div class="feature">
            📝 Тестування
        </div>

        <div class="feature">
            🏆 Сертифікати
        </div>

        <div class="feature">
            📊 Статистика
        </div>

    </div>

</div>

</body>
</html>
